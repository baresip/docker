name: Delete old container images

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  clean-ghcr:
    name: Delete old unused container images
    runs-on: ubuntu-latest
    steps:
      - name: Delete 'dev' containers older than a week
        uses: snok/container-retention-policy@v3.1.0
        with:
          image-names: docker/*-dev
          cut-off: 1w
          account: baresip
          token: ${{ secrets.PAT }}

      - name: Delete 'stable' containers older six months
        uses: snok/container-retention-policy@v3.1.0
        with:
          image-names: docker/*
          cut-off: 6m
          account: baresip
          keep-n-most-recent: 6
          skip-tags: latest
          token: ${{ secrets.PAT }}
